name: Freebie Report
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run finder
        env:
          FREEBIE_EMAIL: ${{ secrets.FREEBIE_EMAIL }}
          FREEBIE_PASS: ${{ secrets.FREEBIE_PASS }}
        run: python local_finder.py
      - name: Save state
        run: |
          git config user.name "freebie-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A freebie_data
          git diff --staged --quiet || git commit -m "state $(date -u +%F)"
          git push
